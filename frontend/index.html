<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flapp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Barlow+Semi+Condensed:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body, #root { height: 100%; margin: 0; }
      html { background: #2b3039; }
    </style>
    <!-- Применяем сохранённую тему ДО первой отрисовки (FOUC prevention) -->
    <script>
      (function () {
        var t = localStorage.getItem('flapp-theme') || 'fl';
        if (t === 'warm-dark') t = 'fl';
        document.documentElement.setAttribute('data-theme', t);
        var bg = { 'fl': '#2b3039', 'dark': '#16161A', 'light': '#F3F1EE' };
        document.documentElement.style.background = bg[t] || '#2b3039';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
